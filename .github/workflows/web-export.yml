name: "Godot Web Export"
on:
  push:
    branches:
      - main

permissions:
  contents: write  # Allows creating tags, releases, and writing files

jobs:
  export_web:
    name: Web Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          # FIX 1: Provide explicit authentication token to fix "terminal prompts disabled"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Game using Firebelley Action
        id: export
        # FIX 2: firebelley v7.0.0 relies on an internal container toolchain;
        # setting the node runtime directly on the runner ensures proper execution environment.
        uses: firebelley/godot-export@v7.0.0
        env:
          # FIX 3: Suppresses Node 20 deprecation errors and forces the runtime to Node 24
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          godot_executable_download_url: https://tuxfamily.org
          godot_export_templates_download_url: https://tuxfamily.org
          relative_project_path: ./
          # FIX 4: Keeps archiving enabled but ensures a clean build workspace
          archive_output: true

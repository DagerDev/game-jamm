name: Web Export

on:
  push:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest

    container:
      image: barichello/godot-ci:4.6

    steps:
      - uses: actions/checkout@v4

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --verbose --export 0 build/web/index.html

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
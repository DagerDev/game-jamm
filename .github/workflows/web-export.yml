name: "Godot Web Export"
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_web:
    name: Web Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Game using Firebelley Action
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          # Use the exact file download URLs below
          godot_executable_download_url: https://tuxfamily.org
          godot_export_templates_download_url: https://tuxfamily.org
          relative_project_path: ./
          archive_output: true

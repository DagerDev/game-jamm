name: "Godot Web Export"

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export:
    name: Export Game
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Source Code
        uses: actions/checkout@v4

      - name: 🤖 Setup Godot 4.6.2
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          include-templates: true  

      - name: 🗀 Create Export Directory Location
        run: mkdir -p builds/web

      - name: 🚀 Export Web Preset
        # Fixes pathing layout by forcing Godot to run cleanly out of the checkout directory root
        run: |
          cd $GITHUB_WORKSPACE
          godot --headless --export-release "Web" ./builds/web/index.html

      - name: 🗎 Compress Web Files
        run: |
          cd builds/web
          zip -r ../../web-build.zip .

      - name: 📢 Create GitHub Release
        uses: ncipollo/release-action@v1.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: "build-${{ github.run_number }}"
          artifacts: "web-build.zip"

name: "Godot Web Export"

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  export_game:
    runs-on: ubuntu-latest
    name: Native Godot Export
    steps:
    - name: 📦 Checkout Source Code
      uses: actions/checkout@v4

    - name: 🛠️ Install Linux Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip zip

    - name: 🤖 Download Godot Engine & Templates
      run: |
        # Fetch the exact 4.6.2 stable artifacts from the mirror
        wget -q "https://github.com"
        wget -q "https://github.com"
        
        # Unzip engine binary and apply native execution permission flags
        unzip -oq Godot_v4.6.2-stable_linux.x86_64.zip
        mv Godot_v4.6.2-stable_linux.x86_64 godot
        chmod +x godot
        
        # FIXES EXIT CODE 9: Forces explicit extraction path maps cleanly without permissions conflicts
        mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
        unzip -oq Godot_v4.6.2-stable_export_templates.tpz -d /tmp
        mv /tmp/templates/* ~/.local/share/godot/export_templates/4.6.2.stable/

    - name: 🗀 Create Output Folders
      run: mkdir -p builds/web

    - name: 🔄 Initialize Godot Resource Cache
      run: ./godot --headless --editor --quit --path ./

    - name: 🚀 Compile Web Release Build
      run: ./godot --headless --path ./ --export-release "Web" ./builds/web/index.html

    - name: 🗎 Create Production Zip Archive
      run: |
        cd builds/web
        zip -r ../../web-build.zip .

    - name: 📢 Create GitHub Release Artifact
      uses: ncipollo/release-action@v1.14.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        generateReleaseNotes: true
        tag: "build-${{ github.run_number }}"
        artifacts: "web-build.zip"
